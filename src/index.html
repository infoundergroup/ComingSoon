<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOUNDER | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .logo {
            width: 70px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #d7c690 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            opacity: 0.6;
            font-weight: 300;
        }

        footer {
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border-top: 1px solid rgba(197, 168, 118, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .contact-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
            opacity: 0.8;
        }

        .contact-link i {
            color: #d7c690;
            font-size: 1.1rem;
        }

        .contact-link:hover {
            color: #d7c690;
            opacity: 1;
        }

        @media (max-width: 768px) {
            footer {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="container">
            <img src="./../public/logo.png" alt="Infounder Logo" class="logo">
            <h1>COMING SOON</h1>
            <p>your digital visibility partner</p>
        </div>
    </div>

    <footer>
        <a href="mailto:contact@infounder.ma" class="contact-link">
            <i class="fas fa-envelope"></i>
            contact@infounder.ma
        </a>
        
        <div  class="contact-link">
            <i class="fas fa-phone"></i>
            +212 5 25 07 40 37
        </div>

        <a href="https://linkedin.com/company/infounder" target="_blank" class="contact-link">
            <i class="fab fa-linkedin"></i>
            LinkedIn
        </a>
    </footer>

</body>

</html>
