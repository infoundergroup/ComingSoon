<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOUNDER</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta name="description" content="Marrakech-based digital agency scaling startups, e-commerce, and real estate.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="side-strip strip-left"></div>
    <div class="side-strip strip-right"></div>

    <div class="content-container">
        <main>
            <a href="index.html" class="logo-link">
                <img src="assets/infounder-logo.png" alt="Infounder Logo" class="logo-main">
            </a>
            
            <div class="hero-content" id="heroMain">
                <h1 class="hero-headline">New Startup <br><span>Journey Ahead.</span></h1>
                <p class="sub-statement">
                    We’ve moved onto a new startup journey and we’ll be back soon.
                </p>
                <a href="#" class="btn-cta" id="triggerReveal">Check it Out</a>
            </div>

            <footer>
                <p class="label">Partner Brand</p>
                <a href="https://lafrenchtech.ma/" target="_blank" class="partner-link">
                    <img src="assets/french-tech.png" alt="French Tech" class="partner-img">
                </a>
            </footer>
        </main>
    </div>

    <div class="reveal-overlay" id="revealOverlay">
        <div class="reveal-container" id="revealStage"></div>
        <a href="#" class="btn-back" id="btnBack">Back</a>
    </div>

    <script>
        window.onload = function() {
            const trigger = document.getElementById('triggerReveal');
            const overlay = document.getElementById('revealOverlay');
            const stage = document.getElementById('revealStage');
            const backBtn = document.getElementById('btnBack');

            const sequence = [
                { content: "INFOUNDER GROUP is a technology and marketing innovation agency.", type: "p1" },
                { content: "We build, grow, and position digital products and ambitious brands.", type: "p1" },
                { content: "Startups • E-commerce • Real Estate • Hospitality", type: "highlight" },
                { content: "From product strategy and tech architecture to SEO, content, and paid acquisition.", type: "p1" },
                { content: "Based in Marrakech. Built for global markets.", type: "p1" },
                { content: "contacts", type: "contacts" } 
            ];

            let activeTimeouts = [];

            async function runCinematic() {
                stage.innerHTML = ''; 
                activeTimeouts.forEach(t => clearTimeout(t));
                activeTimeouts = [];

                const duration = 6000; 
                const overlapDelay = 3500; 

                for (let i = 0; i < sequence.length; i++) {
                    const item = sequence[i];
                    const line = document.createElement('div');
                    
                    if (item.type === "contacts") {
                        line.className = "reveal-line contact-grid-wrapper animate-stay";
                        line.innerHTML = `
                            <div class="contact-grid">
                                <a  class="contact-item">contact@infoundergroup.com</a>
                                <a class="contact-item">+1 (858) 256-6955</a>
                            </div>
                            <div class="social-links-line">
                                <a href="https://www.linkedin.com/company/infounder/" target="_blank" class="contact-item">LinkedIn</a>
                            </div>
                        `;
                        await new Promise(resolve => setTimeout(resolve, 2500));
                        stage.appendChild(line);
                        return; 
                    }

                    line.className = `reveal-line animate-fade-out ${item.type}`;
                    line.innerText = item.content;
                    stage.appendChild(line);

                    setTimeout(() => {
                        if (line.parentNode) line.remove();
                    }, duration);

                    await new Promise(resolve => {
                        const timeout = setTimeout(resolve, overlapDelay);
                        activeTimeouts.push(timeout);
                    });
                }
            }

            trigger.onclick = function(e) {
                e.preventDefault();
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    overlay.classList.add('active');
                    runCinematic();
                }, 50);
            };

            backBtn.onclick = function(e) {
                e.preventDefault();
                overlay.classList.remove('active');
                activeTimeouts.forEach(t => clearTimeout(t));
                setTimeout(() => {
                    overlay.style.display = 'none';
                    stage.innerHTML = '';
                    document.body.style.overflow = 'auto';
                }, 600);
            };
        };
    </script>
</body>
</html>
